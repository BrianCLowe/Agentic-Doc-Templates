name: Agent or tool problem
description: Something went wrong with Cursor, Claude Code, Grok, Copilot, or another agent following these templates
title: "[Agent] "
labels: ["agent-tool"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Concrete agent behavior (what it did vs what you expected) is the most useful feedback for this project.

  - type: dropdown
    id: tool
    attributes:
      label: Agent / tool
      description: Where you saw the problem
      options:
        - Cursor
        - Claude Code
        - Grok Build / Grok.com
        - GitHub Copilot
        - Cline
        - Continue
        - ChatGPT / other chat UI
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: tool_version
    attributes:
      label: Tool version / mode (optional)
      description: e.g. Cursor Agent, Claude Code CLI, Grok.com chat
      placeholder: Cursor Agent

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What the agent did (wrong files, invented §3.0 exceptions, nested feature folders, skipped Understanding, etc.)
      placeholder: Agent created features/MainWorkspace/spec.md instead of flat MainWorkspace.md …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: Correct layout, workflow step, or file set
    validations:
      required: true

  - type: dropdown
    id: templates_present
    attributes:
      label: Did the project have docs/templates/ from this repo?
      options:
        - Yes — full pack
        - Yes — partial / outdated
        - Chat UI only (AGENT.md)
        - Not sure
    validations:
      required: true

  - type: input
    id: template_version
    attributes:
      label: Template / workflow version (if known)
      description: From Master_Index.md or Master_Index_Template.md
      placeholder: "2.0"

  - type: textarea
    id: prompt
    attributes:
      label: Prompt or rule that was in play (optional)
      description: Rough prompt text, or whether Modular_Documentation_Rule / chat-ui AGENT.md was loaded
      render: markdown

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, links, related Discussions
